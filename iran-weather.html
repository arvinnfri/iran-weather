<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>هواشناسی ایران | پلتفرم هوش هواشناسی</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#01040a;
  --bg-1:#050b16;
  --panel:rgba(13,22,38,.62);
  --panel-2:rgba(9,16,28,.78);
  --border:rgba(94,200,255,.16);
  --border-strong:rgba(94,200,255,.4);
  --accent:#3fd4ff;
  --accent-2:#0ea5e9;
  --accent-soft:rgba(63,212,255,.14);
  --warn:#ff8a3d;
  --danger:#ff5470;
  --text:#eaf3fb;
  --muted:#7f93ac;
  --muted-2:#546479;
  --radius:20px;
  --font:'Vazirmatn','Segoe UI',Tahoma,sans-serif;
  --sky-gradient:radial-gradient(1100px 700px at 78% -10%, rgba(63,212,255,.10), transparent 60%), radial-gradient(900px 600px at 10% 110%, rgba(14,165,233,.10), transparent 60%), linear-gradient(180deg,#020814 0%, #050c1a 45%, #01040a 100%);
  --map-bg:#030a14;
  --input-bg:rgba(255,255,255,.04);
  --btn-bg:rgba(255,255,255,.04);
  --fx-cloud-opacity:0.55;
  transition:background .5s, color .5s;
}
body.light .stars{opacity:.15;}

body.light{
  --bg-0:#f0f4f8;
  --bg-1:#e2e8f0;
  --panel:rgba(255,255,255,.72);
  --panel-2:rgba(248,250,252,.85);
  --border:rgba(0,80,140,.12);
  --border-strong:rgba(0,100,180,.3);
  --accent:#0088cc;
  --accent-2:#006699;
  --accent-soft:rgba(0,136,204,.1);
  --warn:#e07020;
  --danger:#d04050;
  --text:#1a2a3a;
  --muted:#556677;
  --muted-2:#8899aa;
  --sky-gradient:radial-gradient(1100px 700px at 78% -10%, rgba(100,180,220,.15), transparent 60%), radial-gradient(900px 600px at 10% 110%, rgba(80,160,200,.12), transparent 60%), linear-gradient(180deg,#dce6f0 0%, #e8eef4 45%, #f0f4f8 100%);
  --map-bg:#dde5ed;
  --input-bg:rgba(0,0,0,.04);
  --btn-bg:rgba(0,0,0,.04);
  --fx-cloud-opacity:0.7;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%; max-width:100vw; overflow-x:hidden;}
body{
  font-family:var(--font);
  background:var(--bg-0);
  color:var(--text);
  overflow-x:hidden;
  min-height:100vh;
  width:100%;
}
/* mobile-only elements hidden by default, shown via media queries */
.mobile-nav{display:none;}
.dash-backdrop{display:none;}
.dash-btn{display:none !important;}
#citiesToggle{display:none;}
::-webkit-scrollbar{height:8px;width:8px;}
::-webkit-scrollbar-thumb{background:rgba(94,200,255,.25);border-radius:10px;}
::-webkit-scrollbar-track{background:transparent;}
button{cursor:pointer;}

/* ---------- ambient backdrop ---------- */
.sky{
  position:fixed; inset:0; z-index:0;
  background:var(--sky-gradient);
}
.stars{position:fixed; inset:0; z-index:0; opacity:.5;
  background-image:
    radial-gradient(1.5px 1.5px at 20% 30%, #fff, transparent),
    radial-gradient(1px 1px at 70% 20%, #fff, transparent),
    radial-gradient(1px 1px at 40% 70%, #fff, transparent),
    radial-gradient(1.5px 1.5px at 85% 60%, #fff, transparent),
    radial-gradient(1px 1px at 60% 85%, #fff, transparent),
    radial-gradient(1px 1px at 12% 80%, #fff, transparent);
  background-size:600px 600px;
}

/* ---------- layout shell ---------- */
.app{position:relative; z-index:1; display:grid; grid-template-columns:76px 1fr min(380px,30vw); grid-template-rows:64px 1fr 128px; grid-template-areas:
  "topbar topbar topbar"
  "sidebar main dash"
  "sidebar carousel dash";
  height:100vh; gap:0; max-width:100vw; overflow:hidden;
}
.sidebar.lang-en ~ * { /* no direct way, use body class instead */ }
body.lang-en .app{grid-template-columns:88px 1fr min(380px,30vw);}

/* ── Tablet Landscape ≤ 1200px ── */
@media (max-width:1200px){
  .app{grid-template-columns:64px 1fr; grid-template-rows:64px auto auto; grid-template-areas:
    "topbar topbar"
    "sidebar main"
    "sidebar carousel"; height:auto; min-height:100vh;}
  body.lang-en .app{grid-template-columns:74px 1fr;}
  .dash{position:static; width:100%; grid-column:1 / -1; grid-row:auto; border-right:none; border-top:1px solid var(--border);}
  .main{min-height:520px;}
  .map-overlay-left{width:200px; gap:7px; top:10px; left:10px;}
  .mini5{gap:3px;}
  .m5day{padding:6px 2px 7px;}
  .m5day .m5hi{font-size:11px;}
  .m5day .m5lo{font-size:9px;}
  .m5day .m5n{font-size:8px;}
  .mini-card{padding:8px 6px;}
  .mini-card h4{font-size:10px;}
  .now-temp{font-size:44px;}
  .grid4{grid-template-columns:repeat(4,1fr); gap:5px;}
  .grid5{grid-template-columns:repeat(5,1fr); gap:5px;}
  .forecast5{grid-template-columns:repeat(5,1fr); gap:4px;}

  /* topbar compact */
  .search{max-width:280px; margin:0 14px;}
  .search input{padding:8px 38px 8px 12px; font-size:12px;}
  .brand{font-size:15px;}
  .lang-toggle button{padding:5px 10px; font-size:11px;}
}

/* ── Tablet Portrait ≤ 900px ── */
@media (max-width:900px){
  .app{grid-template-columns:56px 1fr; grid-template-rows:56px auto auto auto; grid-template-areas:
    "topbar topbar"
    "sidebar main"
    "sidebar dash"
    "sidebar carousel"; height:auto; min-height:100vh;}
  body.lang-en .app{grid-template-columns:66px 1fr;}
  .dash{padding:16px 12px 30px;}
  .dash-head h1{font-size:22px;}
  .main{min-height:440px;}

  /* overlay becomes compact strips */
  .map-overlay-left{width:170px; gap:5px; top:6px; left:6px;}
  .mini5{gap:2px;}
  .m5day{padding:4px 1px 5px; border-radius:8px;}
  .m5day .wicon{width:16px; height:16px;}
  .m5day .m5hi{font-size:10px;}
  .m5day .m5lo{font-size:8px;}
  .m5day .m5n{font-size:7px;}
  .mini-card{border-radius:12px; padding:6px 4px;}
  .mini-card h4{font-size:9px; margin-bottom:3px;}
  .mini-card svg.hchart{height:56px;}
  .mini-hourly-labels{font-size:7px;}
  .panels2{gap:5px;}
  .mini-panel{height:64px; border-radius:10px;}
  .mini-panel .mp-title{font-size:7.5px; top:4px; right:6px;}
  .allprov-pill{padding:6px 10px; font-size:10px; top:10px; right:10px;}

  /* topbar shrink */
  .topbar{padding:0 10px;}
  .search{max-width:180px; margin:0 8px;}
  .search input{font-size:11px; padding:7px 34px 7px 10px;}
  .brand{font-size:14px; gap:6px;}
  .brand .dot{width:28px; height:28px; border-radius:8px;}
  .icon-btn{width:32px; height:32px; border-radius:8px;}
  .icon-btn svg{width:15px; height:15px;}
  .lang-toggle button{padding:4px 8px; font-size:10px;}

  /* stats wrap */
  .grid4{grid-template-columns:repeat(4,1fr); gap:4px;}
  .grid5{grid-template-columns:repeat(5,1fr); gap:4px;}
  .stat{padding:8px 4px;}
  .stat b{font-size:12px;}
  .stat span{font-size:8px;}

  /* forecast stays row but tighter */
  .forecast5{gap:4px;}
  .fday{padding:8px 2px; border-radius:10px;}
  .fday .fd-hi{font-size:11px;}
  .fday .fd-lo{font-size:9px;}
  .fday .fd-name{font-size:9px;}

  .now-temp{font-size:38px;}
  .now-temp sup{font-size:18px;}
  .now-cond .wicon{width:40px; height:40px;}

  /* carousel tighter */
  .card-mini{flex:0 0 100px; height:72px; border-radius:10px;}
  .card-mini .cm-text b{font-size:10px;}
  .card-mini .cm-text span{font-size:9px;}
  .carousel{gap:7px; padding:8px 10px;}
}

/* ── Mobile ≤ 650px ── */
@media (max-width:650px){
  .app, body.lang-en .app{grid-template-columns:1fr; grid-template-rows:48px 1fr; grid-template-areas:
    "topbar"
    "main"; height:100vh; height:100dvh; overflow:hidden;}

  /* topbar compact */
  .topbar{padding:0 10px; gap:6px;}
  .brand{font-size:11px; gap:3px; white-space:nowrap;}
  .brand-logo{width:28px; height:28px; border-radius:8px;}
  .brand .dot{width:28px; height:28px; border-radius:8px;}
  .brand .dot svg{width:14px; height:14px;}
  .search{display:none !important;}
  .lang-toggle{display:flex; font-size:10px;}
  .lang-toggle button{padding:3px 5px; font-size:9px; border-radius:6px;}
  .top-actions{gap:3px;}
  .icon-btn{width:28px; height:28px; border-radius:7px;}
  .icon-btn svg{width:14px; height:14px;}

  /* dash button in topbar */
  .dash-btn{display:none !important;}

  /* map takes full screen */
  .main{min-height:0; max-height:none; flex:1; overflow:hidden;}
  .map-wrap{padding:4px;}
  svg.iranmap{min-height:0; width:100%; height:100%;}
  .stage-vignette{background:radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(1,4,10,.4) 100%);}

  /* overlay compact horizontal strip – positioned at very top */
  .map-overlay-left{width:calc(100% - 100px); position:absolute; top:6px; bottom:auto; left:0; right:auto; padding:0 4px;
    flex-direction:column; gap:3px; background:transparent; z-index:6;}
  .map-overlay-left > *{flex:0 0 auto; width:100%;}
  .panels2{gap:3px; display:flex; flex-direction:row;}
  .panels2 > *{flex:1 1 0; min-width:0;}
  .mini5{display:flex; flex-wrap:nowrap; gap:2px; margin:0;}
  .mini5 .m5day:last-child{display:none;}
  .m5day{flex:0 0 auto; width:32px; padding:1px 1px 2px; border-radius:6px;}
  .m5day .m5hi{font-size:9px;} .m5day .m5lo{font-size:6.5px;} .m5day .m5n{font-size:6px;}
  .m5day .wicon{width:12px; height:12px;}
  .mini-card{padding:3px 2px; border-radius:8px;}
  .mini-card h4{font-size:7.5px; margin-bottom:0;}
  .mini-card svg.hchart{height:36px; width:100%; max-width:none;}
  .mini-hourly-labels{font-size:6px;}
  .mini-panel{height:38px; border-radius:6px; width:auto;}
  .mini-panel .mp-title{font-size:6px; top:1px; right:3px;}
  .allprov-pill{padding:3px 6px; font-size:7.5px; top:6px; right:4px; border-radius:10px; gap:2px;}
  .allprov-pill svg{width:10px; height:10px;}

  /* hide desktop sidebar & carousel on mobile */
  .sidebar{display:none !important;}
  .carousel-wrap{display:none !important;}
  .dash{grid-area:auto;}

  /* show mobile elements */
  .mobile-nav{display:flex;}
  .dash-backdrop{display:block;}
  #citiesToggle{display:flex;}

  /* dashboard → slide-up drawer */
  .dash{position:fixed !important; bottom:0; left:0; right:0; top:48px; z-index:50; border-right:none;
    border-radius:20px 20px 0 0; padding:16px 12px 100px; overflow-y:auto; overflow-x:hidden;
    transform:translateY(110vh); transition:transform .4s cubic-bezier(.2,.85,.25,1);
    box-shadow:0 -8px 40px rgba(0,0,0,.5); max-width:100%; grid-area:auto;}
  .dash.open{transform:translateY(0);}

  /* cities list drawer – slides from right */
  .cities-drawer{position:fixed; top:48px; right:0; bottom:70px; width:200px; max-width:70vw; z-index:55;
    background:var(--panel-2); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
    border-left:1px solid var(--border); overflow-y:auto; padding:8px 6px;
    transform:translateX(100%); transition:transform .35s cubic-bezier(.2,.85,.25,1);}
  .cities-drawer.open{transform:translateX(0);}
  .city-item{display:flex; align-items:center; gap:10px; padding:10px 16px; cursor:pointer; color:var(--muted);
    font-size:13px; font-weight:600; transition:.15s; border-bottom:1px solid var(--border);}
  .city-item:hover,.city-item:active{color:var(--accent); background:var(--accent-soft);}
  .city-item .ci-dot{width:8px; height:8px; border-radius:50%; background:var(--accent); opacity:.6; flex-shrink:0;}
  .city-item .ci-temp{font-size:12px; color:var(--text); margin-right:auto;}
  .dash-backdrop{position:fixed; inset:0; z-index:49; background:rgba(0,0,0,.5); opacity:0; pointer-events:none; transition:opacity .35s;}
  .dash-backdrop.on{opacity:1; pointer-events:auto;}

  .dash-head h1{font-size:20px;}
  .now-row{margin:4px 0 10px;}
  .now-temp{font-size:36px;} .now-temp sup{font-size:16px;}
  .now-cond .wicon{width:40px; height:40px;} .now-cond span{font-size:11px;}
  .grid4{grid-template-columns:repeat(2,1fr); gap:5px;}
  .grid5{grid-template-columns:repeat(3,1fr); gap:5px;}
  .stat{padding:8px 3px; border-radius:10px;}
  .stat b{font-size:12px;} .stat span{font-size:8px;}
  .stat .si{width:14px; height:14px; margin-bottom:4px;}
  .forecast5{display:flex; overflow-x:auto; gap:5px; padding-bottom:4px;}
  .fday{flex:0 0 65px; padding:7px 3px; border-radius:10px;}
  .fday .fd-hi{font-size:11px;} .fday .fd-lo{font-size:8.5px;} .fday .fd-name{font-size:8px;}
  .section-title{font-size:12px; margin:12px 0 6px;}
  .hourly-wrap{padding:10px 6px;}
  .hourly-wrap svg{height:80px;}
  .hourly-labels{font-size:7.5px;}
  .alert-banner{padding:8px 10px; border-radius:12px;}
  .alert-banner .at{font-size:10px;}
  .alert-banner button{font-size:8.5px; padding:4px 8px;}

  /* hide carousel on mobile */
  .carousel-wrap{display:none;}

  /* ── Glass bubble bottom nav ── */
  .mobile-nav{display:flex; position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    z-index:60; background:rgba(15,25,40,.82); backdrop-filter:blur(20px) saturate(1.4);
    -webkit-backdrop-filter:blur(20px) saturate(1.4);
    border:1px solid rgba(255,255,255,.1); border-radius:22px; padding:6px 10px; gap:2px;
    box-shadow:0 8px 32px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.04) inset;}
  .mnav-item{width:42px; height:44px; border-radius:16px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:2px; color:rgba(200,215,230,.6);
    transition:all .25s; position:relative; flex-shrink:0; cursor:pointer;}
  .mnav-item svg{width:18px; height:18px;}
  .mnav-item span{font-size:8px; font-weight:600; line-height:1;}
  .mnav-item.active{color:var(--accent); background:rgba(63,212,255,.12);}
  .mnav-item:active{transform:scale(.92);}
  /* dash button in nav */
  .mnav-dash{width:48px; height:48px; border-radius:18px; background:linear-gradient(135deg,var(--accent),var(--accent-2));
    color:#00131c; box-shadow:0 4px 16px rgba(63,212,255,.35); margin-top:-12px;}
  .mnav-dash svg{width:22px; height:22px; color:#00131c;}
  .mnav-dash.active{background:var(--accent); color:#00131c;}

  /* toast mobile */
  .toast{bottom:110px; font-size:12px; padding:10px 18px; border-radius:12px;}
}

/* ── Extra small ≤ 380px ── */
@media (max-width:380px){
  .main{min-height:0;}
  .map-overlay-left > *{min-width:60px;}
  .mini5{gap:2px;}
  .m5day{flex:1 1 28px; min-width:26px; padding:2px 1px 3px;}
  .m5day .m5hi{font-size:9px;} .m5day .m5lo{font-size:6.5px;} .m5day .m5n{font-size:6px;}
  .mobile-nav{padding:5px 6px; gap:0; border-radius:18px;}
  .mnav-item{width:36px; height:38px; border-radius:12px;}
  .mnav-item svg{width:16px; height:16px;}
  .mnav-item span{font-size:7px;}
  .mnav-dash{width:42px; height:42px; margin-top:-10px;}
  .mnav-dash svg{width:20px; height:20px;}
  .dash{padding:12px 8px 90px;}
  .dash-head h1{font-size:18px;}
  .now-temp{font-size:30px;} .now-temp sup{font-size:14px;}
  .grid5{grid-template-columns:repeat(2,1fr);}
  .stat b{font-size:10px;} .stat span{font-size:7px;}
  .fday{flex:0 0 54px;}
}

/* ---------- topbar ---------- */
.topbar{grid-area:topbar; display:flex; align-items:center; justify-content:space-between; padding:0 22px;
  background:var(--panel-2); backdrop-filter:blur(18px); border-bottom:1px solid var(--border); z-index:20; max-width:100%; overflow:hidden;}
.brand{display:flex; align-items:center; gap:10px; font-weight:800; font-size:17px; letter-spacing:.2px;}
.brand-logo{width:48px; height:48px; border-radius:14px; object-fit:cover;}
.brand .dot{width:48px;height:48px;border-radius:14px; background:linear-gradient(135deg,var(--accent),var(--accent-2)); display:flex; align-items:center; justify-content:center; box-shadow:0 0 24px rgba(63,212,255,.55);}
.brand .dot svg{width:24px;height:24px;}
.search{flex:1; max-width:460px; margin:0 26px; position:relative;}
.search input{width:100%; background:var(--input-bg); border:1px solid var(--border); color:var(--text); padding:10px 42px 10px 16px; border-radius:12px; font-family:var(--font); font-size:13px; outline:none; transition:.2s;}
.search input:focus{border-color:var(--border-strong); box-shadow:0 0 0 3px var(--accent-soft);}
.search svg{position:absolute; right:14px; top:50%; transform:translateY(-50%); width:16px;height:16px; opacity:.5;}
.top-actions{display:flex; align-items:center; gap:14px;}
.lang-toggle{display:flex; background:var(--btn-bg); border:1px solid var(--border); border-radius:10px; overflow:hidden;}
.lang-toggle button{padding:7px 14px; font-family:var(--font); font-size:12px; font-weight:700; background:transparent; border:none; color:var(--muted); cursor:pointer;}
.lang-toggle button.active{background:var(--accent); color:#fff;}
.icon-btn{width:38px;height:38px; border-radius:10px; background:var(--btn-bg); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; color:var(--muted); transition:.2s; cursor:pointer;}
.icon-btn:hover{color:var(--accent); border-color:var(--border-strong);}
.icon-btn svg{width:17px;height:17px;}

/* ---------- sidebar ---------- */
.sidebar{grid-area:sidebar; background:var(--panel-2); border-left:1px solid var(--border); display:flex; flex-direction:column; align-items:center; padding:18px 0; gap:4px; z-index:15;}
.side-item{width:52px; height:54px; border-radius:14px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; color:var(--muted); transition:.2s; position:relative;}
.side-item svg{width:19px;height:19px;}
.side-item span{font-size:9.5px; font-weight:600; text-align:center; line-height:1.2; white-space:nowrap;}
.side-item:hover{color:var(--text);}
.side-item.active{color:var(--accent); background:var(--accent-soft);}
.side-item.active::before{content:"";position:absolute; right:-1px; top:10px; bottom:10px; width:3px; background:var(--accent); border-radius:3px; box-shadow:0 0 10px var(--accent);}
/* wider sidebar for English */
.sidebar.lang-en .side-item{width:62px;}
.sidebar.lang-en .side-item span{font-size:8px; white-space:normal; line-height:1.1;}

/* ---------- main map stage ---------- */
.main{grid-area:main; position:relative; overflow:hidden; display:flex; flex-direction:column; background:var(--map-bg); min-width:0; contain:paint;}
.stage-vignette{position:absolute; inset:0; z-index:2; pointer-events:none;
  background:radial-gradient(ellipse at 50% 40%, transparent 40%, rgba(1,4,10,.6) 100%);}
.map-wrap{position:relative; z-index:1; flex:1; display:flex; align-items:center; justify-content:center; padding:6px; overflow:hidden;}
svg.iranmap{width:100%; height:100%; max-height:100%; overflow:hidden;}
#mapGroup{transform-origin:0px 0px; transition:transform .35s ease;}
#mapGroup.blurring{filter:blur(4px) saturate(1.25);}

.terrain-img{filter:brightness(.95) contrast(1.15) saturate(1.4);}
.terrain-tint{mix-blend-mode:overlay; fill:#0a3050; opacity:.35;}
.terrain-shade{fill:url(#shadeGrad);}
.province-line{fill:none; stroke:rgba(220,240,255,.30); stroke-width:1; stroke-linejoin:round; pointer-events:none;}
.province-line.outer{stroke:rgba(230,245,255,.55); stroke-width:1.6;}
.province-fill-sel{fill:var(--accent); opacity:0; transition:opacity .4s ease; pointer-events:none;}
.province-fill-sel.on{opacity:.16;}

.plabel{fill:#eaf6ff; font-size:9px; font-weight:600; text-anchor:middle; paint-order:stroke; stroke:#01050b; stroke-width:3px; stroke-linejoin:round; opacity:.78; cursor:pointer; transition:.2s; letter-spacing:.2px;}
.plabel:hover{opacity:1; fill:var(--accent);}
.plabel.selected{fill:var(--accent); font-size:12.5px; font-weight:800; opacity:1; stroke-width:3.5px;}
.plabel.kish{font-size:8.5px;}

.sea-label{fill:#5aa9c0; font-size:14px; font-weight:600; font-style:italic; text-anchor:middle;
  paint-order:stroke; stroke:#01050b; stroke-width:3px; stroke-linejoin:round; opacity:.65;
  letter-spacing:2px; cursor:default; pointer-events:none;}

.hero-pin{pointer-events:none;}
.hero-pin .glow{fill:url(#pinGlow);}
.hero-pin .ring{fill:none; stroke:var(--accent); stroke-width:1.6; opacity:0; transform-origin:center;}
.hero-pin.show .ring{opacity:1; animation:pulseRing 1.8s ease-out infinite;}
.hero-pin .drop{fill:var(--accent); stroke:#e9fbff; stroke-width:1.4; filter:drop-shadow(0 2px 10px rgba(63,212,255,.85));}
.hero-pin .hole{fill:#04202c;}
@keyframes pulseRing{0%{stroke-width:3; r:5; opacity:.9;} 100%{stroke-width:.2; r:24; opacity:0;}}

/* top-right reset pill */
.allprov-pill{position:absolute; top:16px; right:16px; z-index:8; display:flex; align-items:center; gap:7px;
  background:var(--panel); border:1px solid var(--border-strong); color:var(--text); padding:8px 14px; border-radius:20px; font-size:12px; font-weight:700; backdrop-filter:blur(10px);}
.allprov-pill svg{width:14px;height:14px; color:var(--accent);}
.allprov-pill:hover{border-color:var(--accent);}

/* floating overlay column on top-left of the map */
.map-overlay-left{position:absolute; top:16px; left:16px; z-index:8; width:max(180px, min(234px, 22vw)); display:flex; flex-direction:column; gap:10px;}
.mini5{display:flex; gap:5px; flex-wrap:wrap;}
.m5day{flex:1; background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:8px 3px 9px; text-align:center; backdrop-filter:blur(10px);}
.m5day.today{border-color:var(--border-strong); background:var(--accent-soft);}
.m5day .m5n{font-size:9px; color:var(--muted); margin-bottom:3px; white-space:nowrap;}
.m5day .wicon{width:22px;height:22px; margin:2px auto;}
.m5day .m5hi{font-size:13px; font-weight:800;}
.m5day .m5lo{font-size:10px; color:var(--muted);}

.mini-card{background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:12px 10px 8px; backdrop-filter:blur(10px);}
.mini-card h4{font-size:11.5px; font-weight:700; text-align:center; color:var(--text); margin-bottom:6px;}
.fx-cloud{filter:brightness(1.05); opacity:var(--fx-cloud-opacity);}
.mini-card svg.hchart{width:100%; height:78px; overflow:visible;}
.mini-hourly-labels{display:flex; justify-content:space-between; padding:0 2px; font-size:8px; color:var(--muted);}

.panels2{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
.mini-panel{position:relative; height:92px; border-radius:14px; overflow:hidden; border:1px solid var(--border); background:#020a14;}
.mini-panel canvas, .mini-panel svg.radar-svg{width:100%; height:100%; display:block;}
.mini-panel .mp-title{position:absolute; top:7px; right:9px; font-size:9.5px; font-weight:700; color:#dff2ff; z-index:2; text-shadow:0 1px 4px #000;}
.mini-panel .mp-play{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:2;}
.mini-panel .mp-play svg{width:22px;height:22px; opacity:.85; filter:drop-shadow(0 2px 6px rgba(0,0,0,.6));}
.blob{animation:blobpulse 4s ease-in-out infinite;}
.blob.b2{animation-delay:.6s;} .blob.b3{animation-delay:1.3s;} .blob.b4{animation-delay:2s;}
@keyframes blobpulse{0%,100%{opacity:.55; transform:scale(1);} 50%{opacity:.95; transform:scale(1.18);}}

/* ---------- carousel ---------- */
.carousel-wrap{grid-area:carousel; position:relative; background:var(--panel-2); border-top:1px solid var(--border); border-left:1px solid var(--border); display:flex; align-items:center; max-width:100%; overflow:hidden;}
.carousel{flex:1; display:flex; align-items:center; gap:10px; padding:12px 14px; overflow-x:auto; scroll-behavior:smooth;}
.carousel::-webkit-scrollbar{height:6px;}
.cnav{flex:0 0 auto; width:30px;height:30px; border-radius:50%; background:var(--panel); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; color:var(--text); margin:0 8px; z-index:2;}
.cnav:hover{border-color:var(--accent); color:var(--accent);}
.cnav svg{width:15px;height:15px;}
.card-mini{flex:0 0 132px; height:92px; border-radius:14px; position:relative; overflow:hidden; border:1px solid var(--border); transition:.2s;}
.card-mini:hover{transform:translateY(-3px); border-color:var(--border-strong);}
.card-mini.active{border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-soft), 0 0 22px rgba(63,212,255,.25);}
.card-mini .cm-bg{position:absolute; inset:0; background-size:cover; background-position:center;}
.card-mini .cm-shade{position:absolute; inset:0; background:linear-gradient(180deg, rgba(0,0,0,0) 25%, rgba(0,5,12,.88) 100%);}
.card-mini .cm-text{position:absolute; bottom:8px; right:10px; left:10px; z-index:2;}
.card-mini .cm-text b{display:block; font-size:12.5px; font-weight:800; text-shadow:0 1px 4px rgba(0,0,0,.6); color:#fff;}
.card-mini .cm-text span{font-size:10.5px; color:#c8ddee;}

/* ---------- dashboard ---------- */
.dash{grid-area:dash; background:var(--panel-2); border-right:1px solid var(--border); overflow-y:auto; overflow-x:hidden; padding:20px 18px 40px; position:relative; z-index:10; max-width:100%;}
.dash-head{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px;}
.dash-head .dh-left{display:flex; align-items:center; gap:8px;}
.dash-head h1{font-size:26px; font-weight:800;}
.dash-head h1 svg{width:16px;height:16px; color:var(--accent); opacity:.8;}
.dash-head .date{font-size:12px; color:var(--muted); margin-top:4px;}
.now-row{display:flex; align-items:center; justify-content:space-between; margin:6px 0 18px;}
.now-temp{font-size:56px; font-weight:800; line-height:1;}
.now-temp sup{font-size:22px; font-weight:600; opacity:.8;}
.now-cond{display:flex; flex-direction:column; align-items:center; gap:4px;}
.now-cond .wicon{width:52px;height:52px;}
.now-cond span{font-size:12px; color:var(--muted);}
.alert-banner{display:flex; align-items:center; gap:10px; background:linear-gradient(90deg, rgba(255,84,112,.14), rgba(255,138,61,.10)); border:1px solid rgba(255,138,61,.35); border-radius:14px; padding:10px 14px; margin-bottom:16px;}
.alert-banner svg{width:20px;height:20px; color:var(--warn); flex-shrink:0;}
.alert-banner .at{flex:1; font-size:12.5px; font-weight:600;}
.alert-banner button{background:rgba(255,255,255,.06); border:1px solid var(--border); color:var(--text); font-family:var(--font); font-size:11px; padding:6px 10px; border-radius:8px;}

.grid4{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:10px;}
.grid5{display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:18px;}
.stat{background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:10px 6px; text-align:center;}
.stat .si{width:18px;height:18px; margin:0 auto 6px; color:var(--accent);}
.stat b{display:block; font-size:14px; font-weight:800;}
.stat span{font-size:9.5px; color:var(--muted);}

.section-title{font-size:13px; font-weight:700; color:var(--muted); margin:18px 0 10px; display:flex; align-items:center; gap:8px;}
.section-title::after{content:""; flex:1; height:1px; background:var(--border);}

.forecast5{display:grid; grid-template-columns:repeat(5,1fr); gap:7px;}
.fday{background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:10px 4px; text-align:center;}
.fday .fd-name{font-size:10.5px; color:var(--muted); margin-bottom:2px;}
.fday .fd-date{font-size:8.5px; color:var(--muted-2); margin-bottom:6px;}
.fday .wicon{width:24px;height:24px; margin:2px auto;}
.fday .fd-hi{font-size:13px; font-weight:800;}
.fday .fd-lo{font-size:11px; color:var(--muted);}
.fday.today{border-color:var(--border-strong); background:var(--accent-soft);}

.hourly-wrap{background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:14px 10px 8px; margin-bottom:6px;}
.hourly-wrap svg{width:100%; height:120px; overflow:visible;}
.hourly-labels{display:flex; justify-content:space-between; padding:0 4px; font-size:9.5px; color:var(--muted);}

/* weather fx canvas over the map */
#fxCanvas{position:absolute; inset:0; z-index:3; pointer-events:none;}

/* toast notification */
.toast-container{position:fixed; bottom:30px; left:50%; transform:translateX(-50%); z-index:9999; pointer-events:none;}
.toast{
  background:linear-gradient(135deg, rgba(13,22,38,.95), rgba(9,16,28,.95));
  border:1px solid var(--border-strong); color:#eaf3fb; padding:12px 28px; border-radius:14px;
  font-family:var(--font); font-size:13.5px; font-weight:600; box-shadow:0 8px 32px rgba(0,0,0,.5),0 0 20px rgba(63,212,255,.1);
  backdrop-filter:blur(12px); animation:toastIn .35s ease, toastOut .35s ease 2.2s forwards;
  display:flex; align-items:center; gap:10px; white-space:nowrap;
}
.toast svg{width:18px;height:18px; color:var(--accent); flex-shrink:0;}
@keyframes toastIn{from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);}}
@keyframes toastOut{from{opacity:1;transform:translateY(0);} to{opacity:0;transform:translateY(-20px);}}
</style>
</head>

<div class="app">

    <div class="side-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V6a2 2 0 0 1 2-2h9l5 5v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"/><path d="M8 9h6M8 13h8M8 17h5"/></svg><span>اخبار هوا</span></div>

  </div>

  <!-- MAIN MAP STAGE -->
  <div class="main">

            <stop offset="100%" stop-color="#010810" stop-opacity=".75"/>

  <!-- MOBILE GLASS BUBBLE NAV -->
  <nav class="mobile-nav" id="mobileNav">

// Open-Meteo WMO weather codes → condition
const WMO_COND = {0:'sunny',1:'sunny',2:'partly',3:'cloudy',45:'fog',48:'fog',51:'rain',53:'rain',55:'rain',61:'rain',63:'rain',65:'rain',80:'rain',81:'rain',82:'rain',71:'snow',73:'snow',75:'snow',77:'snow',85:'snow',86:'snow',95:'rain',96:'rain',99:'rain'};

async function fetchWeatherForProvince(id,lat,lng){
  try{
    const [wRes, aRes] = await Promise.all([
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&hourly=temperature_2m,relative_humidity_2m,precipitation_probability,weather_code,wind_speed_10m,pressure_msl&daily=temperature_2m_max,temperature_2m_min,weather_code,sunrise,sunset,uv_index_max&timezone=Asia/Tehran&forecast_days=5`),
      fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lng}&hourly=us_aqi&timezone=Asia/Tehran&forecast_days=1`)
    ]);
    if(!wRes.ok || !aRes.ok) throw new Error('API error');
    const d=await wRes.json(), aq=await aRes.json();
    const h=d.hourly, dy=d.daily;
    const nowH=new Date().getHours();
    const curTemp=Math.round(h.temperature_2m[nowH]||h.temperature_2m[0]);
    const curHum=h.relative_humidity_2m[nowH]||50;
    const curWind=Math.round(h.wind_speed_10m[nowH]||8);
    const curPress=Math.round(h.pressure_msl[nowH]||1013);
    const curCode=h.weather_code[nowH]||0;
    const curPrecip=h.precipitation_probability[nowH]||0;
    const realAqi=Math.round((aq.hourly.us_aqi[nowH]||30)*0.83);
    const hourlyPts=[0,3,6,9,12,15,18,21].map(i=>Math.round(h.temperature_2m[i]||curTemp));
    const days=dy.time.map((t,i)=>({d:t,hi:Math.round(dy.temperature_2m_max[i]),lo:Math.round(dy.temperature_2m_min[i]),c:WMO_COND[dy.weather_code[i]]||'partly'}));
    return {temp:curTemp,feels:curTemp-(curWind>15?3:1),humidity:curHum,pressure:curPress,wind:curWind,uv:Math.round(dy.uv_index_max[0]||3),aqi:realAqi,sunrise:dy.sunrise?dy.sunrise[0].slice(11,16):'06:00',sunset:dy.sunset?dy.sunset[0].slice(11,16):'17:00',precip:curPrecip,cond:WMO_COND[curCode]||'partly',alert:null,hourly:hourlyPts,daily:days,_loaded:true};
  }catch(e){return null;}
}

function genFakeWeather(lat,lng){
  const b=15+Math.round((35-lat)*1.2)+Math.round(Math.random()*8);
  const isDesert=lat<33&&lng>52,isCoast=lat<28,isMtn=lat>36;
  const hum=isDesert?12+Math.round(Math.random()*15):isCoast?55+Math.round(Math.random()*25):isMtn?30+Math.round(Math.random()*25):25+Math.round(Math.random()*30);
  const w=5+Math.round(Math.random()*18),c=isDesert?'sunny':isCoast?'partly':isMtn?'partly':'sunny';
  const p=c==='rain'?40+Math.round(Math.random()*40):c==='partly'?Math.round(Math.random()*20):0;
  const t=isDesert?b+5:isCoast?b+2:b;
  return {temp:t,feels:t-2,humidity:hum,pressure:1008+Math.round(Math.random()*14),wind:w,uv:c==='sunny'?6+Math.round(Math.random()*3):3,aqi:45+Math.round(Math.random()*100),sunrise:'06:'+(10+Math.round(Math.random()*20)),sunset:'17:'+('0'+Math.round(Math.random()*20)).slice(-2),precip:p,cond:c,alert:null,hourly:[b-3,b-4,b-5,b-3,b,b+3,b+5,b+1],daily:Array.from({length:5},(_,i)=>({d:['امروز','سه‌شنبه','چهارشنبه','پنجشنبه','جمعه'][i],hi:t+(i%2?1:-1),lo:t-10+(i%3),c:(i===0?c:'partly')})),_loaded:false};
}

const PROVINCES={};
const CAROUSEL_ORDER=[];
async function buildProvinces(){
  const stored=localStorage.getItem('iran-weather-cache');
  let cache=null;
  if(stored){try{cache=JSON.parse(stored);if(Date.now()-cache.ts>3600000)cache=null;}catch(e){}}
  const ids=Object.keys(PROVINCE_COORDS);
  const results=await Promise.allSettled(ids.map(id=>{
    const[lat,lng]=PROVINCE_COORDS[id];
    if(cache&&cache.data[id]&&cache.data[id]._loaded) return Promise.resolve(cache.data[id]);
    return fetchWeatherForProvince(id,lat,lng);
  }));
  const newCache={ts:Date.now(),data:{}};
  ids.forEach((id,i)=>{
    const result=results[i];
    let data=(result.status==='fulfilled'&&result.value)?result.value:null;
    if(!data){const[lat,lng]=PROVINCE_COORDS[id];data=genFakeWeather(lat,lng);}
    const geo=MAP_DATA.provinces[id],cap=MAP_DATA.capitals[id];
    const name=(geo&&geo.name)?geo.name:(PROVINCE_EN[id]||id);
    const px=(geo&&geo.cx)?geo.cx:(cap?cap.cx:400),py=(geo&&geo.cy)?geo.cy:(cap?cap.cy:350);
    PROVINCES[id]=Object.assign({id,name,labelX:px,labelY:py,px,py},data);
    CAROUSEL_ORDER.push(id); newCache.data[id]=data;
  });
  try{localStorage.setItem('iran-weather-cache',JSON.stringify(newCache));}catch(e){}
}

function showToast(msg){
  const container = document.getElementById('toastContainer');
  const existing = container.querySelector('.toast');
  if(existing) existing.remove();
  const div = document.createElement('div');
  div.className='toast';
  div.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v5M12 16h.01"/></svg>${msg}`;
  container.appendChild(div);
  setTimeout(()=>div.remove(), 2700);
}

  const isLight = document.body.classList.contains('light');
  localStorage.setItem('iran-weather-theme', isLight?'light':'dark');
  // update cloud opacity
  document.querySelectorAll('.fx-cloud').forEach(c=>{
    c.style.opacity = isLight ? '0.7' : '0.55';
  });
  // update sun flare for light mode
  const sunFlare = document.getElementById('sunFlare');
  if(isLight) sunFlare.style.mixBlendMode = 'multiply';
  else sunFlare.style.mixBlendMode = 'screen';
  showToast(isLight ? t('lightOn') : t('darkOn'));
});

const langBtns = document.querySelectorAll('.lang-toggle button');
function setLang(lang){
  currentLang = lang;
  localStorage.setItem('iran-weather-lang', lang);
  langBtns.forEach(b=>b.classList.toggle('active', b.textContent.trim().toLowerCase()===lang));

  // Toggle English class for wider sidebar
  const sidebar = document.querySelector('.sidebar');
  if(lang==='en'){ sidebar.classList.add('lang-en'); document.body.classList.add('lang-en'); }
  else { sidebar.classList.remove('lang-en'); document.body.classList.remove('lang-en'); }

  // Update static UI text
  document.querySelector('.search input').placeholder = t('search');
  // Update brand text (last text node after logo/dot)
  const brand = document.querySelector('.brand');
  const brandNodes = brand.childNodes;
  for(let i=brandNodes.length-1; i>=0; i--){
    if(brandNodes[i].nodeType===3 && brandNodes[i].textContent.trim()){
      brandNodes[i].textContent = ' '+t('brand'); break;
    }
  }
  const sideKeys = ['home','location','map','fav','news','alerts','settings'];
  document.querySelectorAll('.sidebar .side-item span').forEach((s,i)=>{ if(i<sideKeys.length) s.textContent = t(sideKeys[i]); });
  document.querySelector('.allprov-pill').lastChild && (document.querySelector('.allprov-pill').lastChild.textContent = ' '+t('allProv'));

  // Update mobile nav labels
  const mnavLabels = {home:'mHome',search:'mSearch',fav:'mSaved',settings:'mSettings'};
  const mnavLang = {fa:{mHome:'خانه',mSearch:'جستجو',mSaved:'ذخیره',mSettings:'تنظیمات'},
                    en:{mHome:'Home',mSearch:'Search',mSaved:'Saved',mSettings:'Settings'}};
  document.querySelectorAll('.mnav-item[data-page] span').forEach(s=>{
    const key = mnavLabels[s.parentElement.dataset.page];
    if(key) s.textContent = mnavLang[lang][key];
  });

  // Update map labels
  document.querySelectorAll('.plabel').forEach(l=>{
    const id = l.dataset.id;
    if(id && PROVINCE_EN[id]) l.textContent = lang==='en' ? PROVINCE_EN[id] : MAP_DATA.provinces[id]?.name || PROVINCE_EN[id];
  });
  const kishLabel = document.querySelector('.plabel.kish');
  if(kishLabel) kishLabel.textContent = lang==='en' ? 'Kish' : 'کیش';

  // Update sea labels
  document.getElementById('caspianLabel').textContent = lang==='en' ? 'Caspian Sea' : 'دریای خزر';
  document.getElementById('gulfLabel').textContent = lang==='en' ? 'Persian Gulf' : 'خلیج فارس';
  document.getElementById('omanLabel').textContent = lang==='en' ? 'Gulf of Oman' : 'دریای عمان';

  // Re-render carousel and dashboard if a province is selected
  if(typeof selectedId !== 'undefined' && selectedId) renderDashboard(PROVINCES[selectedId]);
  updateCarouselNames();
}

    if(nameEl) nameEl.textContent = currentLang==='en' ? (PROVINCE_EN[id] || p.name) : p.name;
  });

/* ============ CAMERA PAN & ZOOM ============ */
const mapGroup = document.getElementById('mapGroup');
const mapWrap = document.querySelector('.map-wrap');
let camScale = 1, camTX = 0, camTY = 0;
const MIN_SCALE = 1, MAX_SCALE = 5;

function applyCam(animate){
  mapGroup.style.transition = animate ? 'transform .6s ease' : 'none';
  mapGroup.style.transform = `scale(${camScale}) translate(${camTX}px, ${camTY}px)`;
}

// Mouse pan
let panning = false, panStartX, panStartY, panOrigTX, panOrigTY;
mapWrap.addEventListener('mousedown',(e)=>{
  if(e.target.closest('.plabel') || e.target.closest('.card-mini') || e.target.closest('button')) return;
  panning=true; panStartX=e.clientX; panStartY=e.clientY; panOrigTX=camTX; panOrigTY=camTY;
  mapGroup.style.transition='none'; mapWrap.style.cursor='grabbing';
});
window.addEventListener('mousemove',(e)=>{
  if(!panning) return;
  camTX = panOrigTX + (e.clientX - panStartX) / camScale;
  camTY = panOrigTY + (e.clientY - panStartY) / camScale;
  applyCam(false);
});
window.addEventListener('mouseup',()=>{ panning=false; mapWrap.style.cursor=''; });

// Mouse wheel zoom
mapWrap.addEventListener('wheel',(e)=>{
  e.preventDefault();
  const rect = mapWrap.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const oldScale = camScale;
  camScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, camScale * (e.deltaY<0 ? 1.1 : 0.9)));
  if(camScale === oldScale) return;
  camTX = mx/camScale - (mx/oldScale - camTX);
  camTY = my/camScale - (my/oldScale - camTY);
  applyCam(false);
},{passive:false});

// Touch pan & pinch zoom
let touchStartDist, touchStartScale, touchStartTX, touchStartTY, touchMidX, touchMidY;
mapWrap.addEventListener('touchstart',(e)=>{
  if(e.touches.length===1){
    panning=true; panStartX=e.touches[0].clientX; panStartY=e.touches[0].clientY;
    panOrigTX=camTX; panOrigTY=camTY; mapGroup.style.transition='none';
  } else if(e.touches.length===2){
    panning=false;
    const dx=e.touches[1].clientX-e.touches[0].clientX, dy=e.touches[1].clientY-e.touches[0].clientY;
    touchStartDist=Math.hypot(dx,dy); touchStartScale=camScale; touchStartTX=camTX; touchStartTY=camTY;
    touchMidX=(e.touches[0].clientX+e.touches[1].clientX)/2; touchMidY=(e.touches[0].clientY+e.touches[1].clientY)/2;
  }
},{passive:false});
mapWrap.addEventListener('touchmove',(e)=>{
  if(e.touches.length===1 && panning){
    camTX = panOrigTX + (e.touches[0].clientX - panStartX) / camScale;
    camTY = panOrigTY + (e.touches[0].clientY - panStartY) / camScale;
    applyCam(false);
  } else if(e.touches.length===2 && touchStartDist){
    e.preventDefault();
    const dx=e.touches[1].clientX-e.touches[0].clientX, dy=e.touches[1].clientY-e.touches[0].clientY;
    const dist=Math.hypot(dx,dy); const newScale=Math.min(MAX_SCALE,Math.max(MIN_SCALE,touchStartScale*(dist/touchStartDist)));
    const rect=mapWrap.getBoundingClientRect();
    const mx=touchMidX-rect.left, my=touchMidY-rect.top;
    camScale=newScale; camTX=mx/newScale-(mx/touchStartScale-touchStartTX); camTY=my/newScale-(my/touchStartScale-touchStartTY);
    applyCam(false);
  }
},{passive:false});
mapWrap.addEventListener('touchend',()=>{ panning=false; touchStartDist=null; });

// Double-tap to zoom
let lastTap=0;
mapWrap.addEventListener('click',(e)=>{
  if(e.target.closest('.plabel') || e.target.closest('.card-mini') || e.target.closest('button')) return;
  const now=Date.now();
  if(now-lastTap<300){
    if(camScale>1.5){ camScale=MIN_SCALE; camTX=0; camTY=0; }
    else { camScale=2.5; const r=mapWrap.getBoundingClientRect(); camTX=(r.width/2)/camScale-VB_W/2; camTY=(r.height/2)/camScale-VB_H/2; }
    applyCam(true);
  }
  lastTap=now;
});

// Update flyTo to use cam state
function flyTo(px,py){
  const s = 2.3;
  const cx = VB_W/2, cy = VB_H/2;
  camScale = s; camTX = cx/s - px; camTY = cy/s - py;
  mapGroup.classList.add('blurring');
  applyCam(true);
  setTimeout(()=>mapGroup.classList.remove('blurring'), 800);
}
function resetCamera(){
  camScale = MIN_SCALE; camTX = 0; camTY = 0;
  applyCam(true);
  document.querySelectorAll('.plabel').forEach(m=>m.classList.remove('selected'));
  document.getElementById('heroPin').classList.remove('show');
  document.getElementById('selFillPath').classList.remove('on');
}
document.getElementById('allProvPill').addEventListener('click', resetCamera);

/* ============ SELECT PROVINCE ============ */
let selectedId = null;
function selectProvince(id){
  if(id===selectedId) return;
  selectedId = id;
  const p = PROVINCES[id];

  flyTo(p.px, p.py);

  document.querySelectorAll('.plabel').forEach(m=> m.classList.toggle('selected', m.dataset.id===id));
  document.querySelectorAll('.card-mini').forEach(c=>c.classList.toggle('active', c.dataset.id===id));

  const pin = document.getElementById('heroPin');
  pin.setAttribute('transform', `translate(${p.px},${p.py})`);
  pin.classList.add('show');

  const selFill = document.getElementById('selFillPath');
  const geo = MAP_DATA.provinces[id];
  if(geo){ selFill.setAttribute('d', geo.d); selFill.classList.add('on'); }
  else { selFill.classList.remove('on'); }

  renderDashboard(p);
  setWeatherFX(p.cond);
}

/* hourly line chart (reused for both mini & full) */
function renderHourly(vals, svgId, labelsId, w, h){
  const svg = document.getElementById(svgId);
  const labels = document.getElementById(labelsId);
  const times = ["21:00","00:00","03:00","06:00","09:00","12:00","15:00","18:00"];
  const pad=14;
  const min = Math.min(...vals)-2, max = Math.max(...vals)+2;
  const stepX = (w-pad*2)/(vals.length-1);
  const fontSize = w>300?10:9;
  const pts = vals.map((v,i)=>{
    const x = pad+i*stepX;
    const y = h-14 - ((v-min)/(max-min))*(h-30);
    return [x,y];
  });
  const linePath = pts.map((pt,i)=> (i===0?'M':'L')+pt[0].toFixed(1)+','+pt[1].toFixed(1)).join(' ');
  const areaPath = linePath + ` L${pts[pts.length-1][0]},${h-6} L${pts[0][0]},${h-6} Z`;
  const gid = 'hg_'+svgId;
  const dots = pts.map((pt,i)=>`<circle cx="${pt[0]}" cy="${pt[1]}" r="2.6" fill="#3fd4ff" stroke="#01131c" stroke-width="1.2"/>
    <text x="${pt[0]}" y="${pt[1]-7}" text-anchor="middle" font-size="${fontSize}" fill="#dff4ff" font-weight="700">${vals[i]}°</text>`).join('');
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  svg.innerHTML = `
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3fd4ff" stop-opacity=".45"/>
      <stop offset="100%" stop-color="#3fd4ff" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${areaPath}" fill="url(#${gid})"/>
    <path d="${linePath}" fill="none" stroke="#3fd4ff" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
  `;
  labels.innerHTML = times.map(t=>`<span>${t}</span>`).join('');
}

/* ============ RADAR (real Iran silhouette, animated blobs) ============ */
function buildRadar(){
  const sil = MAP_DATA.sil;
  const svg = document.getElementById('radarSvg');
  svg.setAttribute('viewBox', `0 0 ${sil.w} ${sil.h}`);
  const blobs = [
    {cx:sil.w*0.42, cy:sil.h*0.38, r:sil.w*0.16, c1:'rgba(60,230,140,.85)', c2:'rgba(20,140,90,.15)'},
    {cx:sil.w*0.55, cy:sil.h*0.5, r:sil.w*0.13, c1:'rgba(80,210,255,.85)', c2:'rgba(20,110,180,.12)'},
    {cx:sil.w*0.35, cy:sil.h*0.6, r:sil.w*0.11, c1:'rgba(255,214,90,.7)', c2:'rgba(180,120,20,.1)'},
    {cx:sil.w*0.6, cy:sil.h*0.3, r:sil.w*0.09, c1:'rgba(90,255,190,.7)', c2:'rgba(20,140,90,.1)'}
  ];
  svg.innerHTML = `<defs>
      <clipPath id="silClip"><path d="${sil.d}"/></clipPath>
      ${blobs.map((b,i)=>`<radialGradient id="rb${i}" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="${b.c1}"/><stop offset="100%" stop-color="${b.c2.replace(/[\d.]+\)$/,'0)')}"/>
      </radialGradient>`).join('')}
    </defs>
    <path d="${sil.d}" fill="#0a1520"/>
    <g clip-path="url(#silClip)">
      ${blobs.map((b,i)=>`<circle class="blob b${i+1}" cx="${b.cx}" cy="${b.cy}" r="${b.r}" fill="url(#rb${i})" style="transform-origin:${b.cx}px ${b.cy}px"/>`).join('')}
    </g>
    <path d="${sil.d}" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="1.4"/>`;
}
buildRadar();

/* ============ SATELLITE MINI (grayscale swirling clouds) ============ */
function setupCanvas(id){
  const c = document.getElementById(id);
  const dpr = window.devicePixelRatio||1;
  const rect = c.getBoundingClientRect();
  c.width = Math.max(rect.width,10)*dpr; c.height = Math.max(rect.height,10)*dpr;
  const ctx = c.getContext && c.getContext('2d');
  if(ctx) ctx.scale(dpr,dpr);
  return {ctx, w:rect.width, h:rect.height};
}
let satAnim, satT=0;
function drawSat(){
  try{
  cancelAnimationFrame(satAnim);
  const {ctx,w,h} = setupCanvas('satCanvas');
  if(!ctx) return;
  function loop(){
    satT+=0.006;
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle = '#0e1116'; ctx.fillRect(0,0,w,h);
    for(let i=0;i<6;i++){
      const bx = (w*0.15*i + satT*40) % (w+80) - 40;
      const by = h*(0.18+0.14*i)+Math.sin(satT*3+i)*8;
      const r = 26+i*7;
      const gr = ctx.createRadialGradient(bx,by,0,bx,by,r);
      gr.addColorStop(0,'rgba(230,230,230,.55)');
      gr.addColorStop(1,'rgba(230,230,230,0)');
      ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(bx,by,r,0,7); ctx.fill();
    }
    satAnim = requestAnimationFrame(loop);
  }
  loop();
  }catch(e){ console.warn('sat canvas unavailable', e); }
}

/* ============ WEATHER FX – natural, beautiful animations ============ */
const fxCanvas = document.getElementById('fxCanvas');
const fxCtx = fxCanvas.getContext && fxCanvas.getContext('2d');
let fxParticles = [], fxMode='partly', fxRAF, fxTime=0;
function resizeFx(){
  const rect = fxCanvas.parentElement.getBoundingClientRect();
  fxCanvas.width = rect.width; fxCanvas.height = rect.height;
}
window.addEventListener('resize', resizeFx);
resizeFx();

function seedParticles(mode){
  fxParticles = [];
  const W = fxCanvas.width, H = fxCanvas.height;
  if(mode==='rain'){
    for(let i=0;i<260;i++) fxParticles.push({
      x:Math.random()*W*1.4-W*0.2, y:Math.random()*H*1.3-H*0.3,
      len:8+Math.random()*10, spd:18+Math.random()*14, w:0.3+Math.random()*0.7,
      op:0.15+Math.random()*0.3, wind:1.5+Math.random()*2.5, splash:Math.random()
    });
  } else if(mode==='snow'){
    for(let i=0;i<200;i++) fxParticles.push({
      x:Math.random()*W, y:Math.random()*H,
      r:0.4+Math.random()*4, spd:0.2+Math.random()*0.5,
      wobble:0.3+Math.random()*0.8, phase:Math.random()*Math.PI*2,
      op:0.4+Math.random()*0.55, flicker:0.003+Math.random()*0.008, drift:Math.random()*0.5+0.3
    });
  } else if(mode==='fog'){
    for(let i=0;i<8;i++) fxParticles.push({
      x:Math.random()*W*1.4-W*0.2, y:H*0.45+Math.random()*H*0.55,
      rx:80+Math.random()*200, ry:25+Math.random()*55,
      spd:0.08+Math.random()*0.2, op:0.07+Math.random()*0.1
    });
  } else if(mode==='cloudy'){
    // cloud images handled separately via DOM elements – see initCloudLayer()
  }
}
function setWeatherFX(mode){ fxMode=mode; cancelAnimationFrame(fxRAF); seedParticles(mode); runFx(); }

function runFx(){
  if(!fxCtx){ return; }
  const W = fxCanvas.width, H = fxCanvas.height;
  fxCtx.clearRect(0,0,W,H);
  fxTime += 0.016;

  // ── SUN FLARE – realistic lens flare for sunny / partly ──
  const sunFlare = document.getElementById('sunFlare');
  if(fxMode==='sunny' || fxMode==='partly'){
    sunFlare.style.display='block';
    const targetOp = fxMode==='sunny' ? 0.7 : 0.35;
    const currentOp = parseFloat(sunFlare.style.opacity)||0;
    sunFlare.style.opacity = currentOp + (targetOp - currentOp) * 0.03;
  } else {
    const currentOp = parseFloat(sunFlare.style.opacity)||0;
    if(currentOp > 0.005){
      sunFlare.style.opacity = currentOp * 0.9;
    } else {
      sunFlare.style.display='none'; sunFlare.style.opacity='0';
    }
  }

  // ── RAIN – realistic streaks with wind drift ──
  if(fxMode==='rain'){
    // subtle overall darkening for rainy atmosphere
    fxCtx.fillStyle='rgba(10,18,30,0.04)'; fxCtx.fillRect(0,0,W,H);

    fxParticles.forEach(p=>{
      // wind drift varies slightly per frame
      const drift = p.wind + Math.sin(fxTime*5+p.splash*10)*0.4;
      const g = fxCtx.createLinearGradient(p.x,p.y,p.x+drift*2,p.y+p.len);
      g.addColorStop(0,`rgba(160,200,230,${p.op*0.3})`);
      g.addColorStop(0.5,`rgba(140,185,220,${p.op})`);
      g.addColorStop(1,`rgba(120,170,210,0)`);
      fxCtx.strokeStyle=g; fxCtx.lineWidth=p.w; fxCtx.lineCap='round';
      fxCtx.beginPath(); fxCtx.moveTo(p.x,p.y); fxCtx.lineTo(p.x+drift*1.5,p.y+p.len); fxCtx.stroke();

      // tiny splash dot at end for some drops
      if(p.splash<0.12 && p.y+p.len<H && p.y+p.len>H*0.4){
        fxCtx.fillStyle=`rgba(180,210,235,${p.op*0.4})`;
        fxCtx.beginPath(); fxCtx.arc(p.x+drift*1.5,p.y+p.len,1,0,Math.PI*2); fxCtx.fill();
      }

      p.y+=p.spd*2.5; p.x+=drift*0.8;
      if(p.y>H+40){
        p.y=-15-Math.random()*50;
        p.x=Math.random()*W*1.3-W*0.15;
        p.splash=Math.random();
      }
    });
  }

  // ── SNOW – soft drifting snowfall, slower & more natural ──
  if(fxMode==='snow'){
    // subtle cool whitening for winter atmosphere
    fxCtx.fillStyle='rgba(220,230,245,0.015)'; fxCtx.fillRect(0,0,W,H);

    fxParticles.forEach(p=>{
      // gentle flicker for sparkle
      p.op += p.flicker; if(p.op>0.85||p.op<0.3) p.flicker*=-1;

      // main flake
      fxCtx.fillStyle=`rgba(255,255,255,${p.op})`;
      fxCtx.beginPath(); fxCtx.arc(p.x,p.y,p.r,0,Math.PI*2); fxCtx.fill();

      // soft glow for medium+ flakes
      if(p.r>1.4){
        const gf = fxCtx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*3);
        gf.addColorStop(0,`rgba(240,245,255,${p.op*0.35})`);
        gf.addColorStop(0.5,`rgba(220,235,250,${p.op*0.12})`);
        gf.addColorStop(1,'rgba(200,220,245,0)');
        fxCtx.fillStyle=gf; fxCtx.beginPath(); fxCtx.arc(p.x,p.y,p.r*3,0,Math.PI*2); fxCtx.fill();
      }

      // gentle sway + slow drift down
      p.y += p.spd;
      p.x += Math.sin(fxTime*1.8 + p.phase) * p.wobble + p.drift*0.1;
      p.phase += 0.005;

      if(p.y > H + 30){
        p.y = -15 - Math.random()*20;
        p.x = Math.random()*W;
        p.phase = Math.random()*Math.PI*2;
      }
    });
  }

  // ── FOG – soft layered mist ──
  if(fxMode==='fog'){
    fxParticles.forEach(p=>{
      p.x+=p.spd; p.y+=Math.sin(fxTime*0.25+p.x*0.001)*0.2;
      if(p.x>W+p.rx){p.x=-p.rx; p.y=H*0.4+Math.random()*H*0.5;}
      const g = fxCtx.createRadialGradient(p.x,p.y,p.rx*0.2,p.x,p.y,p.rx);
      g.addColorStop(0,`rgba(215,228,242,${p.op})`); g.addColorStop(0.5,`rgba(200,218,238,${p.op*0.6})`);
      g.addColorStop(1,'rgba(185,210,230,0)');
      fxCtx.fillStyle=g; fxCtx.beginPath(); fxCtx.ellipse(p.x,p.y,p.rx,p.ry,0,0,Math.PI*2); fxCtx.fill();
    });
  }

  // ── CLOUDY – real PNG cloud images drifting over the map ──
  if(fxMode==='cloudy'){
    document.getElementById('cloudLayer').style.display='block';
    const clouds = document.querySelectorAll('.fx-cloud');
    clouds.forEach(c=>{
      let cx = parseFloat(c.dataset.x) + parseFloat(c.dataset.spd);
      if(cx > W + 200){ cx = -250; c.style.top = (Math.random()*H*0.35)+'px'; }
      c.dataset.x = cx;
      c.style.left = cx+'px';
    });
  } else {
    document.getElementById('cloudLayer').style.display='none';
  }

  fxRAF = requestAnimationFrame(runFx);
}

/* ============ CLOUD LAYER – real PNG images ============ */
const CLOUD_IMGS = [
  'https://freepngimg.com/thumb/cloud/26-cloud-png-image-thumb.png',
  'https://pngimg.com/uploads/cloud/cloud_PNG112213.png'
];
function initCloudLayer(){
  const layer = document.getElementById('cloudLayer');
  const W = fxCanvas.width, H = fxCanvas.height;
  for(let i=0;i<7;i++){
    const img = document.createElement('img');
    img.className='fx-cloud';
    img.src = CLOUD_IMGS[i % 2];
    img.style.cssText = 'position:absolute;pointer-events:none;';
    const w = 120 + Math.random() * 180;
    img.style.width = w+'px';
    img.style.top = (Math.random() * H * 0.35)+'px';
    img.dataset.x = Math.random() * W * 1.2 - 100;
    img.dataset.spd = 0.3 + Math.random() * 0.6;
    img.style.left = img.dataset.x+'px';
    layer.appendChild(img);
  }
}
window.addEventListener('resize', ()=>{
  const layer = document.getElementById('cloudLayer');
  layer.innerHTML=''; initCloudLayer();
});

/* ============ MOBILE DASHBOARD TOGGLE ============ */
const dashPanel = document.getElementById('dashPanel');
const dashBackdrop = document.getElementById('dashBackdrop');
function toggleDashboard(){
  const open = dashPanel.classList.toggle('open');
  dashBackdrop.classList.toggle('on', open);
  document.body.style.overflow = open ? 'hidden' : '';
}
// Topbar menu button & mobile nav center button
document.getElementById('dashToggle').addEventListener('click', toggleDashboard);
document.getElementById('mnavDash').addEventListener('click', toggleDashboard);
dashBackdrop.addEventListener('click', toggleDashboard);

// Mobile bottom nav item clicks
document.querySelectorAll('.mnav-item[data-page]').forEach(el=>{
  el.addEventListener('click', function(){
    const page = this.dataset.page;
    if(page==='home'){
      resetCamera();
      if(dashPanel.classList.contains('open')) toggleDashboard();
    } else if(page==='search'){
      document.querySelector('.search input')?.focus();
    } else {
      showToast(t('comingSoon'));
    }
  });
});

/* ============ CITIES LIST DRAWER ============ */
const citiesDrawer = document.getElementById('citiesDrawer');
const citiesBtn = document.getElementById('citiesToggle');

function buildCitiesDrawer(){
  const lang = currentLang;
  const sorted = [...CAROUSEL_ORDER].sort((a,b)=>{
    const na = (lang==='en' ? (PROVINCE_EN[a]||PROVINCES[a]?.name) : PROVINCES[a]?.name) || '';
    const nb = (lang==='en' ? (PROVINCE_EN[b]||PROVINCES[b]?.name) : PROVINCES[b]?.name) || '';
    return na.localeCompare(nb, lang==='en'?'en':'fa');
  });
  citiesDrawer.innerHTML = sorted.map(id=>{
    const p = PROVINCES[id];
    const name = lang==='en' ? (PROVINCE_EN[id]||p.name) : p.name;
    const photo = CITY_PHOTO_URLS[id] || genCityPhoto(id);
    return `<div class="card-mini" data-id="${id}" style="display:flex;flex:none;width:100%;height:90px;margin-bottom:6px;border-radius:10px;cursor:pointer;position:relative;overflow:hidden;border:1px solid var(--border);">
      <div class="cm-bg" style="background-image:url('${photo}');position:absolute;inset:0;background-size:cover;background-position:center;"></div>
      <div class="cm-shade" style="position:absolute;inset:0;background:linear-gradient(180deg, rgba(0,0,0,0) 30%, rgba(0,5,12,.85) 100%);"></div>
      <div class="cm-text" style="position:absolute;bottom:6px;right:8px;left:8px;z-index:2;display:flex;justify-content:space-between;align-items:end;">
        <b style="font-size:12px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.6);">${name}</b>
        <span style="font-size:11px;color:#c8ddee;font-weight:700;">${p.temp}°</span>
      </div>
    </div>`;
  }).join('');
  citiesDrawer.querySelectorAll('.card-mini').forEach(el=>{
    el.addEventListener('click',()=>{
      selectProvince(el.dataset.id);
      citiesDrawer.classList.remove('open');
      document.body.style.overflow = '';
    });
  });
}

citiesBtn.addEventListener('click',()=>{
  const open = citiesDrawer.classList.toggle('open');
  document.body.style.overflow = open ? 'hidden' : '';
  if(open) buildCitiesDrawer();
});
// close when clicking backdrop or map
document.querySelector('.main').addEventListener('click',(e)=>{
  if(citiesDrawer.classList.contains('open') && !e.target.closest('.cities-drawer') && !e.target.closest('#citiesToggle')){
    citiesDrawer.classList.remove('open');
    document.body.style.overflow = '';
  }
});

/* ============ INIT ============ */
async function init(){
  try{ drawSat(); }catch(e){ console.warn(e); }
  try{ initCloudLayer(); }catch(e){ console.warn(e); }

  // Build province data (API or fallback)
  await buildProvinces();

  // Build carousel after provinces are ready
  const carousel = document.getElementById('carousel');
  CAROUSEL_ORDER.forEach(id=>{
    const p = PROVINCES[id];
    if(!p) return;
    const realUrl = CITY_PHOTO_URLS[id];
    const fallback = genCityPhoto(id);
    const photo = realUrl || fallback;
    const card = document.createElement('div');
    card.className='card-mini';
    card.dataset.id=id;
    card.innerHTML = `<div class="cm-bg" style="background-image:url('${photo}')"></div>
      <div class="cm-shade"></div>
      <div class="cm-text"><b>${currentLang==='en'?(PROVINCE_EN[id]||p.name):p.name}</b><span>${p.temp}°C</span></div>`;
    card.addEventListener('click',()=>selectProvince(id));
    if(realUrl){
      const testImg=new Image();
      testImg.onerror=()=>{card.querySelector('.cm-bg').style.backgroundImage=`url('${fallback}')`;};
      testImg.src=realUrl;
    }
    carousel.appendChild(card);
  });

  const start = PROVINCES['tehran'];
  if(start){
    selectedId = null;
    try{ selectProvince('tehran'); }catch(e){ console.warn(e); }
    requestAnimationFrame(()=>{ try{ flyTo(start.px, start.py); }catch(e){ console.warn(e); } });
  }
}
init();
